name: pamina
description: "Pamina: A personalized Mini App framework for Flutter."
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.7.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  plugin_platform_interface: ^2.0.2
  archive: ^3.6.1
  path_provider: ^2.1.5
  path: ^1.9.0
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.1
  webview_flutter_wkwebview: ^3.15.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.pamina.flutter
        pluginClass: PaminaPlugin
      ios:
        pluginClass: PaminaPlugin
  
  assets:
    - assets/
